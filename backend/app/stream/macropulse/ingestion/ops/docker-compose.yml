version: "3.9"

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: macropulse
      POSTGRES_PASSWORD: macropulse
      POSTGRES_DB: macropulse
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U macropulse"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: ../../../../../
      dockerfile: app/stream/macropulse/ingestion/ops/Dockerfile
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.stream.macropulse.ingestion.ops.api_main:app --host 0.0.0.0 --port 8000 --reload
